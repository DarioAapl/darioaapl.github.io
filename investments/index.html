<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#061812" />
<title>Portfolio</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>

<div class="noise" aria-hidden="true"></div>

<header class="topbar">
  <a class="brand" href="./">
    <span class="brand-dot" aria-hidden="true"></span>
    <span class="brand-name">Portfolio</span>
  </a>
</header>

<main class="page">

  <!-- HERO -->
  <section class="hero card" aria-labelledby="growth-title">
    <div class="card-edge" aria-hidden="true"></div>
    <p class="eyebrow" id="growth-title">Portfolio growth</p>
    <div class="growth-display" id="growth-display" data-state="loading">
      <span class="growth-arrow" id="growth-arrow"></span>
      <span class="growth-num" id="growth-num">&mdash;</span>
      <span class="growth-unit" id="growth-unit"></span>
    </div>
    <p class="caption" id="growth-caption">Loading&hellip;</p>
  </section>

  <!-- ACTIVITY -->
  <section class="activity" aria-labelledby="activity-title">
    <div class="section-head">
      <p class="eyebrow">Ledger</p>
      <h2 class="section-title" id="activity-title">Activity <span class="sep">/</span> Investments</h2>
    </div>

    <div class="stat-band">
      <div class="stat-cell">
        <p class="eyebrow">Total invested</p>
        <p class="stat-num total" id="stat-total">&mdash;</p>
      </div>
      <div class="stat-cell">
        <p class="eyebrow">Entries</p>
        <p class="stat-num" id="stat-entries">&mdash;</p>
      </div>
      <div class="stat-cell">
        <p class="eyebrow">Growth</p>
        <p class="stat-num" id="stat-growth" data-state="loading">&mdash;</p>
      </div>
    </div>

    <ul class="ledger" id="ledger" aria-live="polite">
      <li class="ledger-empty" id="ledger-empty">No activity yet.</li>
    </ul>
  </section>

  <footer class="foot">
    <p class="muted small">Read-only ledger &middot; updated by hand.</p>
  </footer>
</main>

<script src="./app.js"></script>
</body>
</html>
